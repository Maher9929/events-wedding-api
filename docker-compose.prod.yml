name: doha-events-prod

x-logging: &default-logging
  driver: local
  options:
    max-size: "10m"
    max-file: "5"

services:
  reverse-proxy:
    image: caddy:2-alpine
    container_name: doha-events-proxy
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    environment:
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN:?Set FRONTEND_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?Set API_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - doha-events-prod

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: doha-events-backend
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      PORT: 3000
      REDIS_URL: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD}@redis:6379
    expose:
      - "3000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    tmpfs:
      - /tmp
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:3000/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - doha-events-prod

  frontend:
    image: ${FRONTEND_IMAGE:?Set FRONTEND_IMAGE}:${IMAGE_TAG:-latest}
    container_name: doha-events-frontend
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1/",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - doha-events-prod

  redis:
    image: redis:7-alpine
    container_name: doha-events-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD}
    command:
      [
        "sh",
        "-c",
        "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"",
      ]
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    logging: *default-logging
    networks:
      - doha-events-prod

volumes:
  backend_uploads:
  backend_logs:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  doha-events-prod:
    driver: bridge
